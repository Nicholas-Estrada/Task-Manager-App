<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tempus — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --beige-50:  #fdf9f3;
      --beige-100: #f5edd8;
      --beige-200: #ece0c2;
      --beige-300: #dfd0a8;
      --blue-400:  #4f86c6;
      --blue-500:  #3b6faf;
      --blue-600:  #2d5a96;
      --blue-900:  #1a2f50;
      --priority-high:   #d94f4f;
      --priority-medium: #e8963a;
      --priority-low:    #4aab72;
      --shadow-sm: 0 1px 4px rgba(26,47,80,0.08);
      --shadow-md: 0 4px 16px rgba(26,47,80,0.12);
      --shadow-lg: 0 8px 32px rgba(26,47,80,0.16);
      --radius: 14px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--beige-50);
      color: var(--blue-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--blue-900);
      color: var(--beige-100);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }
    .header-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--beige-100);
    }
    .header-logo span { color: var(--blue-400); }
    .header-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-icon {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: var(--beige-100);
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.16); }

    /* ── TODAY BANNER ── */
    #today-banner {
      background: linear-gradient(135deg, var(--blue-500) 0%, var(--blue-600) 100%);
      color: #fff;
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      overflow-x: auto;
      border-bottom: 3px solid var(--blue-400);
      min-height: 56px;
    }
    #overdue-banner {
      background: linear-gradient(135deg, var(--priority-high) 0%, #c92a2a 100%);
      color: #fff;
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      overflow-x: auto;
      border-bottom: 3px solid #a61e1e;
      min-height: 56px;
    }
    .banner-label {
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.85;
      white-space: nowrap;
      padding-right: 1.5rem;
      border-right: 1px solid rgba(255,255,255,0.3);
    }
    .banner-tasks { display: flex; gap: 0.75rem; flex-wrap: nowrap; }
    .banner-chip {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
      display: flex; align-items: center; gap: 0.4rem;
      backdrop-filter: blur(4px);
    }
    .banner-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .banner-empty { font-size: 0.85rem; opacity: 0.7; font-style: italic; }

    /* ── LAYOUT ── */
    .app-body {
      display: flex;
      flex: 1;
      gap: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--beige-100);
      border-right: 1px solid var(--beige-200);
      padding: 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
    }
    .sidebar-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blue-400);
      margin-bottom: 0.5rem;
    }
    .mini-calendar { width: 100%; }
    .mini-cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .mini-cal-title {
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 600;
    }
    .mini-cal-nav {
      background: none; border: none; cursor: pointer;
      color: var(--blue-500); font-size: 0.9rem;
      padding: 2px 6px; border-radius: 4px;
      transition: background 0.15s;
    }
    .mini-cal-nav:hover { background: var(--beige-200); }
    .mini-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .mini-cal-dow {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--blue-400);
      text-align: center;
      padding: 0.2rem 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .mini-cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 400;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .mini-cal-day:hover { background: var(--beige-200); }
    .mini-cal-day.today {
      background: var(--blue-500);
      color: #fff;
      font-weight: 600;
    }
    .mini-cal-day.selected {
      background: var(--blue-900);
      color: #fff;
    }
    .mini-cal-day.has-tasks::after {
      content: '';
      position: absolute;
      bottom: 2px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--blue-400);
    }
    .mini-cal-day.today.has-tasks::after { background: #fff; }
    .mini-cal-day.other-month { opacity: 0.3; }

    /* Sidebar stats */
    .stat-cards { display: flex; flex-direction: column; gap: 0.6rem; }
    .stat-card {
      background: #fff;
      border: 1px solid var(--beige-200);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .stat-card-label { font-size: 0.8rem; color: #666; font-weight: 400; }
    .stat-card-value { font-size: 1.3rem; font-weight: 600; color: var(--blue-900); }

    /* Priority legend */
    .priority-legend { display: flex; flex-direction: column; gap: 0.5rem; }
    .legend-row {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.8rem; font-weight: 400;
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── MAIN CALENDAR ── */
    .main-content {
      flex: 1;
      padding: 1.5rem 2rem;
      overflow-y: auto;
    }
    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .calendar-nav { display: flex; align-items: center; gap: 1rem; }
    .cal-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--blue-900);
    }
    .cal-nav-btn {
      background: #fff;
      border: 1px solid var(--beige-200);
      border-radius: 8px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.9rem;
      color: var(--blue-600);
      box-shadow: var(--shadow-sm);
      transition: all 0.15s;
    }
    .cal-nav-btn:hover {
      background: var(--blue-500);
      color: #fff;
      border-color: var(--blue-500);
    }
    .btn-today {
      background: #fff;
      border: 1px solid var(--beige-200);
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--blue-600);
      box-shadow: var(--shadow-sm);
      transition: all 0.15s;
    }
    .btn-today:hover { background: var(--beige-200); }

    /* Add Task Button */
    .btn-add {
      background: var(--blue-500);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.55rem 1.25rem;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
      box-shadow: 0 2px 8px rgba(59,111,175,0.35);
      transition: all 0.2s;
    }
    .btn-add:hover {
      background: var(--blue-600);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(59,111,175,0.4);
    }

    /* ── CALENDAR GRID ── */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--beige-200);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      background: #fff;
    }
    .cal-dow-header {
      background: var(--blue-900);
      color: var(--beige-200);
      text-align: center;
      padding: 0.75rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .cal-cell {
      min-height: 130px;
      border-right: 1px solid var(--beige-200);
      border-bottom: 1px solid var(--beige-200);
      padding: 0.5rem;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover { background: var(--beige-50); }
    .cal-cell.other-month { background: var(--beige-50); opacity: 0.7; }
    .cal-cell.today {
      background: #eef4ff;
      border-top: 3px solid var(--blue-400);
    }
    .cal-cell.selected { background: #e8f0fb; }
    .cal-date-num {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--blue-900);
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .cal-date-circle {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
    }
    .cal-cell.today .cal-date-circle {
      background: var(--blue-500);
      color: #fff;
    }
    .cal-cell.other-month .cal-date-num { color: #bbb; }

    /* Task chips in calendar */
    .task-chips { display: flex; flex-direction: column; gap: 3px; }
    .task-chip {
      border-radius: 5px;
      padding: 3px 7px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: filter 0.15s, transform 0.1s;
      max-width: 100%;
    }
    .task-chip:hover { filter: brightness(0.92); transform: translateX(1px); }
    .task-chip.high   { background: #fde8e8; color: #b71c1c; border-left: 3px solid var(--priority-high); }
    .task-chip.medium { background: #fef3e2; color: #7f4400; border-left: 3px solid var(--priority-medium); }
    .task-chip.low    { background: #e6f7ed; color: #1b5e3b; border-left: 3px solid var(--priority-low); }
    .task-chip.completed { opacity: 0.5; text-decoration: line-through; }
    .more-tasks {
      font-size: 0.68rem;
      color: var(--blue-400);
      font-weight: 500;
      padding: 2px 7px;
      cursor: pointer;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,47,80,0.45);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--beige-50);
      border-radius: 20px;
      padding: 2rem;
      width: 480px;
      max-width: 95vw;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.25s ease;
      position: relative;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--blue-900);
      margin-bottom: 1.5rem;
    }
    .modal-close {
      position: absolute; top: 1.25rem; right: 1.25rem;
      background: var(--beige-200); border: none;
      width: 30px; height: 30px; border-radius: 50%;
      cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--blue-900);
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--beige-300); }

    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--blue-600); margin-bottom: 0.4rem;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: #fff;
      border: 1.5px solid var(--beige-200);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--blue-900);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--blue-400);
      box-shadow: 0 0 0 3px rgba(79,134,198,0.15);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .priority-options {
      display: flex; gap: 0.6rem;
    }
    .priority-btn {
      flex: 1;
      padding: 0.55rem;
      border-radius: 10px;
      border: 2px solid var(--beige-200);
      background: #fff;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 500;
      text-align: center;
      transition: all 0.15s;
    }
    .priority-btn.high.active   { background: #fde8e8; border-color: var(--priority-high);   color: #b71c1c; }
    .priority-btn.medium.active { background: #fef3e2; border-color: var(--priority-medium); color: #7f4400; }
    .priority-btn.low.active    { background: #e6f7ed; border-color: var(--priority-low);    color: #1b5e3b; }
    .priority-btn:hover { border-color: var(--blue-400); }

    .modal-actions {
      display: flex; gap: 0.75rem; justify-content: flex-end;
      margin-top: 1.5rem;
    }
    .btn-cancel {
      background: var(--beige-200); border: none;
      border-radius: 10px; padding: 0.6rem 1.25rem;
      font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
      cursor: pointer; color: var(--blue-900);
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--beige-300); }
    .btn-save {
      background: var(--blue-500); color: #fff; border: none;
      border-radius: 10px; padding: 0.6rem 1.5rem;
      font-family: var(--font-body); font-size: 0.875rem; font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(59,111,175,0.3);
      transition: all 0.15s;
    }
    .btn-save:hover { background: var(--blue-600); }

    /* Task detail panel */
    .task-detail-panel {
      position: fixed; right: 0; top: 64px;
      width: 320px; height: calc(100vh - 64px);
      background: #fff;
      border-left: 1px solid var(--beige-200);
      box-shadow: -4px 0 20px rgba(26,47,80,0.1);
      padding: 1.5rem;
      z-index: 150;
      overflow-y: auto;
      animation: slideInRight 0.25s ease;
    }
    @keyframes slideInRight {
      from { transform: translateX(100%); }
      to   { transform: translateX(0); }
    }
    .detail-close {
      position: absolute; top: 1rem; right: 1rem;
      background: var(--beige-100); border: none;
      width: 28px; height: 28px; border-radius: 50%;
      cursor: pointer; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--blue-900);
    }
    .detail-priority-badge {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 20px; padding: 0.25rem 0.75rem;
      font-size: 0.75rem; font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .detail-priority-badge.high   { background: #fde8e8; color: #b71c1c; }
    .detail-priority-badge.medium { background: #fef3e2; color: #7f4400; }
    .detail-priority-badge.low    { background: #e6f7ed; color: #1b5e3b; }
    .detail-title {
      font-family: var(--font-display);
      font-size: 1.2rem; font-weight: 700;
      color: var(--blue-900); margin-bottom: 0.5rem;
    }
    .detail-date {
      font-size: 0.82rem; color: var(--blue-400);
      margin-bottom: 1rem;
    }
    .detail-desc {
      font-size: 0.88rem; color: #555; line-height: 1.6;
      border-top: 1px solid var(--beige-200);
      padding-top: 1rem;
    }
    .detail-actions {
      display: flex; gap: 0.5rem; margin-top: 1.25rem;
    }
    .btn-complete {
      flex: 1; background: var(--priority-low); color: #fff; border: none;
      border-radius: 8px; padding: 0.55rem; font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 500; cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-complete:hover { filter: brightness(0.92); }
    .btn-delete {
      background: #fde8e8; color: var(--priority-high); border: none;
      border-radius: 8px; padding: 0.55rem 1rem; font-family: var(--font-body);
      font-size: 0.82rem; font-weight: 500; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-delete:hover { background: #fbc8c8; }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      background: var(--blue-900); color: #fff;
      border-radius: 10px; padding: 0.75rem 1.5rem;
      font-size: 0.875rem; font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
    }
    @keyframes toastIn  { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toastOut { to   { opacity:0; transform:translateX(-50%) translateY(12px); } }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-logo">Tem<span>pus</span></div>
  <div class="header-actions">
    <button class="btn-icon" title="Notifications" onclick="showToast('🔔 Notifications enabled')">🔔</button>
    <button class="btn-icon" title="Settings">⚙️</button>
    <button class="btn-icon" title="Profile">👤</button>
  </div>
</header>

<!-- OVERDUE BANNER -->
<div id="overdue-banner" style="display:none">
  <div class="banner-label">⚠️ Overdue</div>
  <div class="banner-tasks" id="overdue-tasks"></div>
</div>

<!-- TODAY BANNER -->
<div id="today-banner">
  <div class="banner-label">📌 Today</div>
  <div class="banner-tasks" id="banner-tasks">
    <span class="banner-empty">No tasks today — enjoy your day!</span>
  </div>
</div>

<!-- BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div>
      <div class="sidebar-section-title">Mini Calendar</div>
      <div class="mini-calendar" id="mini-calendar"></div>
    </div>
    <div>
      <div class="sidebar-section-title">Overview</div>
      <div class="stat-cards" id="stat-cards"></div>
    </div>
    <div>
      <div class="sidebar-section-title">Priority Key</div>
      <div class="priority-legend">
        <div class="legend-row"><div class="legend-dot" style="background:var(--priority-high)"></div> High Priority</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--priority-medium)"></div> Medium Priority</div>
        <div class="legend-row"><div class="legend-dot" style="background:var(--priority-low)"></div> Low Priority</div>
      </div>
    </div>
  </aside>

  <!-- MAIN CALENDAR -->
  <main class="main-content">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button class="cal-nav-btn" id="prev-month">&#8592;</button>
        <h2 class="cal-title" id="cal-title"></h2>
        <button class="cal-nav-btn" id="next-month">&#8594;</button>
        <button class="btn-today" onclick="goToday()">Today</button>
      </div>
      <button class="btn-add" onclick="openAddModal()">+ Add Task</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </main>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">New Task</div>

    <div class="form-group">
      <label class="form-label">Task Title</label>
      <input class="form-input" id="task-title" type="text" placeholder="e.g. Design review meeting"/>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="task-desc" placeholder="Optional notes..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="task-date" type="date"/>
    </div>
    <div class="form-group">
      <label class="form-label">Priority</label>
      <div class="priority-options">
        <button class="priority-btn high"   onclick="selectPriority('high')"   id="pri-high">🔴 High</button>
        <button class="priority-btn medium" onclick="selectPriority('medium')" id="pri-medium">🟡 Medium</button>
        <button class="priority-btn low"    onclick="selectPriority('low')"    id="pri-low">🟢 Low</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- TASK DETAIL PANEL (injected dynamically) -->
<div id="detail-panel"></div>

<script>
// ── STATE ──
let tasks = JSON.parse(localStorage.getItem('tempus_tasks') || '[]');
let currentDate = new Date();
let selectedPriority = 'medium';
let editingTaskId = null;
let viewDate = { year: currentDate.getFullYear(), month: currentDate.getMonth() };

// ── HELPERS ──
const pad = n => String(n).padStart(2, '0');
const dateStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayStr = dateStr(currentDate);

function tasksForDate(ds) { return tasks.filter(t => t.date === ds); }
function saveTasks() { localStorage.setItem('tempus_tasks', JSON.stringify(tasks)); }

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}

// ── MINI CALENDAR ──
function renderMiniCalendar() {
  const { year, month } = viewDate;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let html = `
    <div class="mini-cal-header">
      <button class="mini-cal-nav" onclick="changeMonth(-1)">&#8592;</button>
      <div class="mini-cal-title">${months[month].slice(0,3)} ${year}</div>
      <button class="mini-cal-nav" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="mini-cal-grid">
      <div class="mini-cal-dow">Su</div><div class="mini-cal-dow">Mo</div>
      <div class="mini-cal-dow">Tu</div><div class="mini-cal-dow">We</div>
      <div class="mini-cal-dow">Th</div><div class="mini-cal-dow">Fr</div>
      <div class="mini-cal-dow">Sa</div>
  `;
  // prev month tail
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    html += `<div class="mini-cal-day other-month">${d}</div>`;
  }
  // current month
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${pad(month+1)}-${pad(d)}`;
    const isToday = ds === todayStr;
    const hasTasks = tasksForDate(ds).length > 0;
    const classes = ['mini-cal-day', isToday ? 'today' : '', hasTasks ? 'has-tasks' : ''].filter(Boolean).join(' ');
    html += `<div class="${classes}" onclick="jumpTo('${ds}')">${d}</div>`;
  }
  // next month pad
  const total = firstDay + daysInMonth;
  const remainder = 7 - (total % 7);
  if (remainder < 7) for (let d = 1; d <= remainder; d++) {
    html += `<div class="mini-cal-day other-month">${d}</div>`;
  }
  html += '</div>';
  document.getElementById('mini-calendar').innerHTML = html;
}

function changeMonth(delta) {
  viewDate.month += delta;
  if (viewDate.month > 11) { viewDate.month = 0;  viewDate.year++; }
  if (viewDate.month < 0)  { viewDate.month = 11; viewDate.year--; }
  renderAll();
}

function goToday() {
  viewDate = { year: currentDate.getFullYear(), month: currentDate.getMonth() };
  renderAll();
}

function jumpTo(ds) {
  const d = new Date(ds + 'T00:00:00');
  viewDate = { year: d.getFullYear(), month: d.getMonth() };
  renderAll();
}

// ── MAIN CALENDAR ──
function renderMainCalendar() {
  const { year, month } = viewDate;
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = `${months[month]} ${year}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();

  let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    .map(d => `<div class="cal-dow-header">${d}</div>`).join('');

  // prev tail
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    const ds = `${year}-${pad(month)}-${pad(d)}`.replace(`-${pad(month)}-`, month === 0 ? `-12-` : `-${pad(month)}-`);
    html += renderCell(d, ds, true);
  }
  // current
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${year}-${pad(month+1)}-${pad(d)}`;
    html += renderCell(d, ds, false);
  }
  // next pad
  const total = firstDay + daysInMonth;
  const remainder = 7 - (total % 7);
  if (remainder < 7) for (let d = 1; d <= remainder; d++) {
    const ds = `${year}-${pad(month+2 > 12 ? 1 : month+2)}-${pad(d)}`;
    html += renderCell(d, ds, true);
  }

  document.getElementById('calendar-grid').innerHTML = html;
}

function renderCell(dayNum, ds, isOther) {
  const isToday = ds === todayStr;
  const dayTasks = tasksForDate(ds);
  const visible = dayTasks.slice(0, 3);
  const extra = dayTasks.length - 3;
  const classes = ['cal-cell', isOther ? 'other-month' : '', isToday ? 'today' : ''].filter(Boolean).join(' ');

  let chipsHtml = visible.map(t => `
    <div class="task-chip ${t.priority} ${t.completed ? 'completed' : ''}"
         onclick="event.stopPropagation(); openDetail('${t.id}')">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${t.title}</span>
    </div>
  `).join('');

  if (extra > 0) chipsHtml += `<div class="more-tasks">+${extra} more</div>`;

  return `
    <div class="${classes}" onclick="openAddModal('${ds}')">
      <div class="cal-date-num"><div class="cal-date-circle">${dayNum}</div></div>
      <div class="task-chips">${chipsHtml}</div>
    </div>`;
}

// ── OVERDUE BANNER ──
function renderOverdue() {
  const overdueTasks = tasks.filter(t => t.date < todayStr && !t.completed).sort((a,b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    const priOrder = { high: 3, medium: 2, low: 1 };
    return priOrder[b.priority] - priOrder[a.priority];
  });
  const container = document.getElementById('overdue-banner');
  const tasksContainer = document.getElementById('overdue-tasks');
  if (overdueTasks.length === 0) {
    container.style.display = 'none';
    return;
  }
  container.style.display = 'block';
  tasksContainer.innerHTML = overdueTasks.map(t => {
    return `
      <div class="banner-chip" onclick="openDetail('${t.id}')" style="cursor:pointer">
        <div class="banner-dot" style="background:#ff6b6b"></div>
        ${t.title}
      </div>`;
  }).join('');
}

// ── TODAY BANNER ──
function renderBanner() {
  const todayTasks = tasksForDate(todayStr).filter(t => !t.completed);
  const container = document.getElementById('banner-tasks');
  if (todayTasks.length === 0) {
    container.innerHTML = '<span class="banner-empty">No tasks today — enjoy your day!</span>';
    return;
  }
  container.innerHTML = todayTasks.map(t => {
    const colors = { high: '#f87171', medium: '#fbbf24', low: '#4ade80' };
    return `
      <div class="banner-chip" onclick="openDetail('${t.id}')" style="cursor:pointer">
        <div class="banner-dot" style="background:${colors[t.priority]}"></div>
        ${t.title}
      </div>`;
  }).join('');
}

// ── STATS ──
function renderStats() {
  const total     = tasks.length;
  const completed = tasks.filter(t => t.completed).length;
  const today     = tasksForDate(todayStr).length;
  const high      = tasks.filter(t => t.priority === 'high' && !t.completed).length;

  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="stat-card-label">Total Tasks</div><div class="stat-card-value">${total}</div></div>
    <div class="stat-card"><div class="stat-card-label">Completed</div><div class="stat-card-value" style="color:var(--priority-low)">${completed}</div></div>
    <div class="stat-card"><div class="stat-card-label">Due Today</div><div class="stat-card-value" style="color:var(--blue-500)">${today}</div></div>
    <div class="stat-card"><div class="stat-card-label">High Priority</div><div class="stat-card-value" style="color:var(--priority-high)">${high}</div></div>
  `;
}

// ── MODAL ──
function openAddModal(dateParam) {
  editingTaskId = null;
  document.getElementById('modal-title').textContent = 'New Task';
  document.getElementById('task-title').value = '';
  document.getElementById('task-desc').value  = '';
  document.getElementById('task-date').value  = dateParam || todayStr;
  selectPriority('medium');
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('task-title').focus(), 50);
}

function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

function handleOverlayClick(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function selectPriority(p) {
  selectedPriority = p;
  ['high','medium','low'].forEach(x => {
    document.getElementById(`pri-${x}`).classList.toggle('active', x === p);
  });
}

function saveTask() {
  const title = document.getElementById('task-title').value.trim();
  const desc  = document.getElementById('task-desc').value.trim();
  const date  = document.getElementById('task-date').value;
  if (!title) { showToast('⚠️ Please add a task title'); return; }
  if (!date)  { showToast('⚠️ Please select a date'); return; }

  if (editingTaskId) {
    const idx = tasks.findIndex(t => t.id === editingTaskId);
    if (idx > -1) tasks[idx] = { ...tasks[idx], title, description: desc, date, priority: selectedPriority };
    showToast('✅ Task updated!');
  } else {
    tasks.push({
      id: 'task_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      title, description: desc, date,
      priority: selectedPriority,
      completed: false,
      createdAt: new Date().toISOString()
    });
    showToast('✅ Task added!');
  }
  saveTasks();
  closeModal();
  renderAll();
}

// ── DETAIL PANEL ──
function openDetail(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const d = new Date(task.date + 'T00:00:00');
  const dateLabel = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  const priorityLabel = { high: '🔴 High', medium: '🟡 Medium', low: '🟢 Low' }[task.priority];

  document.getElementById('detail-panel').innerHTML = `
    <div class="task-detail-panel">
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-priority-badge ${task.priority}">${priorityLabel} Priority</div>
      <div class="detail-title">${task.title}</div>
      <div class="detail-date">📅 ${dateLabel}</div>
      ${task.description ? `<div class="detail-desc">${task.description}</div>` : ''}
      <div class="detail-actions">
        <button class="btn-complete" onclick="toggleComplete('${task.id}')">
          ${task.completed ? '↩ Reopen' : '✓ Complete'}
        </button>
        <button class="btn-delete" onclick="deleteTask('${task.id}')">🗑</button>
      </div>
    </div>`;
}

function closeDetail() { document.getElementById('detail-panel').innerHTML = ''; }

function toggleComplete(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.completed = !t.completed; saveTasks(); renderAll(); closeDetail(); }
  showToast(t?.completed ? '✅ Task completed!' : '↩ Task reopened');
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks(); renderAll(); closeDetail();
  showToast('🗑 Task deleted');
}

// ── NAV ──
document.getElementById('prev-month').onclick = () => changeMonth(-1);
document.getElementById('next-month').onclick = () => changeMonth(1);

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeDetail(); }
  if (e.key === 'n' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) openAddModal();
});

// ── RENDER ALL ──
function renderAll() {
  renderMiniCalendar();
  renderMainCalendar();
  renderOverdue();
  renderBanner();
  renderStats();
}

// ── SEED DATA (demo) ──
if (tasks.length === 0) {
  const y = currentDate.getFullYear(), m = pad(currentDate.getMonth()+1);
  tasks = [
    { id: 'demo1', title: 'Design review', description: 'Review new UI mockups with team', date: todayStr, priority: 'high', completed: false, createdAt: new Date().toISOString() },
    { id: 'demo2', title: 'Write project proposal', description: 'Draft Q3 proposal document', date: todayStr, priority: 'medium', completed: false, createdAt: new Date().toISOString() },
    { id: 'demo3', title: 'Grocery run', description: '', date: `${y}-${m}-${pad(currentDate.getDate()+2)}`, priority: 'low', completed: false, createdAt: new Date().toISOString() },
    { id: 'demo4', title: 'Team standup', description: 'Daily sync at 9am', date: `${y}-${m}-${pad(currentDate.getDate()+1)}`, priority: 'medium', completed: false, createdAt: new Date().toISOString() },
    { id: 'demo5', title: 'Fix critical bug', description: 'Authentication issue on login page', date: `${y}-${m}-${pad(currentDate.getDate()+3)}`, priority: 'high', completed: false, createdAt: new Date().toISOString() },
    { id: 'demo6', title: 'Overdue meeting', description: 'Missed client call', date: `${y}-${m}-${pad(currentDate.getDate()-1)}`, priority: 'high', completed: false, createdAt: new Date().toISOString() },
  ];
  saveTasks();
}

renderAll();
</script>
</body>
</html>
